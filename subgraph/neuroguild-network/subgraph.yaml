specVersion: 1.3.0

indexerHints:
  prune: auto

schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum
    name: Box
    network: base-sepolia
    source:
      address: "0x42CC38bAc988CDcb0fd7D710cd843b0030f05150"
      abi: Box
      startBlock: 38547098
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - BoxState
      abis:
        - name: Box
          file: ./abis/Box.json
      eventHandlers:
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: ValueChanged(uint256)
          handler: handleValueChanged
      file: ./src/box.ts

  - kind: ethereum
    name: CouncilRegistry
    network: base-sepolia
    source:
      address: "0xDF26d46a4dEDf628b02a170AEf6ad251931CE630"
      abi: CouncilRegistry
      startBlock: 38547098
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - User
        - ProtocolConfig
      abis:
        - name: CouncilRegistry
          file: ./abis/CouncilRegistry.json
      eventHandlers:
        - event: CouncilAdded(indexed address)
          handler: handleCouncilAdded
        - event: CouncilRemoved(indexed address)
          handler: handleCouncilRemoved
        - event: TimelockUpdated(indexed address,indexed address)
          handler: handleTimelockUpdated
      file: ./src/council-registry.ts

  - kind: ethereum
    name: GovernanceContract
    network: base-sepolia
    source:
      address: "0x0176e8d4a87Ce0EED9aeb4813d998E75E31e5d3c"
      abi: GovernanceContract
      startBlock: 38547098
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Proposal
        - ProposalVoteHistory
        - ProtocolConfig
      abis:
        - name: GovernanceContract
          file: ./abis/GovernanceContract.json
      eventHandlers:
        - event: ProposalCanceled(uint256)
          handler: handleProposalCanceled
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: ProposalExecuted(uint256)
          handler: handleProposalExecuted
        - event: ProposalQueued(uint256,uint256)
          handler: handleProposalQueued
        - event: QuorumNumeratorUpdated(uint256,uint256)
          handler: handleQuorumNumeratorUpdated
        - event: ReputationContractUpdated(indexed address)
          handler: handleReputationContractUpdated
        - event: TimelockChange(address,address)
          handler: handleTimelockChange
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
        - event: VoteCastWithParams(indexed address,uint256,uint8,uint256,string,bytes)
          handler: handleVoteCastWithParams
      file: ./src/governance-contract.ts

  - kind: ethereum
    name: GovernanceToken
    network: base-sepolia
    source:
      address: "0x90b82c3ab1Ce5db11A028E696Dff4c0F11d09549"
      abi: GovernanceToken
      startBlock: 38547098
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - TokenAccount
        - GovernanceApproval
        - GovernanceTransferHistory
      abis:
        - name: GovernanceToken
          file: ./abis/GovernanceToken.json
      eventHandlers:
        - event: Approval(indexed address,indexed address,uint256)
          handler: handleApproval
        - event: DelegateChanged(indexed address,indexed address,indexed address)
          handler: handleDelegateChanged
        - event: DelegateVotesChanged(indexed address,uint256,uint256)
          handler: handleDelegateVotesChanged
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
      file: ./src/governance-token.ts

  - kind: ethereum
    name: JobContract
    network: base-sepolia
    source:
      address: "0xEb92E7ccBF2FC2B2578096709862Ecd39C1f2D31"
      abi: JobContract
      startBlock: 38547098
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Job
        - JobBid
        - JobDispute
        - ProtocolConfig
        - JobBidSubmittedHistory
        - JobBidAcceptedHistory
        - JobBidRejectedHistory
        - WorkSubmittedHistory
        - JobCompletedHistory
        - JobCancelledHistory
        - DisputeRaisedHistory
        - DisputeResolvedHistory
        - FundLockedHistory
        - FundReleasedHistory
        - FundRefundedHistory
        - ClientRatedHistory
        - FreelancerRatedHistory
      abis:
        - name: JobContract
          file: ./abis/JobContract.json
      eventHandlers:
        - event: BidAccepted(indexed bytes32,indexed address,uint256,uint256)
          handler: handleBidAccepted
        - event: BidRejected(indexed bytes32,indexed address,uint256,uint256)
          handler: handleBidRejected
        - event: BidSubmitted(indexed bytes32,indexed address,uint256,uint256,string)
          handler: handleBidSubmitted
        - event: ClientRated(indexed bytes32,indexed address,indexed address,uint8)
          handler: handleClientRated
        - event: DisputeRaised(indexed bytes32,indexed address,string)
          handler: handleDisputeRaised
        - event: DisputeResolved(indexed bytes32,address)
          handler: handleDisputeResolved
        - event: FeeUpdated(uint256,uint256,uint256,uint256)
          handler: handleFeeUpdated
        - event: FreelancerRated(indexed bytes32,indexed address,indexed address,uint8)
          handler: handleFreelancerRated
        - event: FundLocked(indexed bytes32,uint256,uint256,indexed address,indexed address)
          handler: handleFundLocked
        - event: FundRefunded(indexed bytes32,uint256,indexed address)
          handler: handleFundRefunded
        - event: FundReleased(indexed bytes32,uint256,uint256)
          handler: handleFundReleased
        - event: JobCancelled(indexed bytes32,indexed address)
          handler: handleJobCancelled
        - event: JobCompleted(indexed bytes32,indexed address)
          handler: handleJobCompleted
        - event: JobCreated(indexed bytes32,indexed address,uint256,uint256,uint256,string)
          handler: handleJobCreated
        - event: JobDetailsUpdated(indexed bytes32,indexed address,uint256,uint256,uint256,string)
          handler: handleJobDetailsUpdated
        - event: JobStarted(indexed bytes32,indexed address)
          handler: handleJobStarted
        - event: ReputationAddressUpdated(indexed address,indexed address)
          handler: handleReputationAddressUpdated
        - event: ReputationPenaltyUpdated(uint8,uint8)
          handler: handleReputationPenaltyUpdated
        - event: ReputationRewardUpdated(uint8,uint8)
          handler: handleReputationRewardUpdated
        - event: ReviewPeriodUpdated(uint256,uint256)
          handler: handleReviewPeriodUpdated
        - event: TimelockUpdated(indexed address,indexed address)
          handler: handleTimelockUpdated
        - event: TreasuryUpdated(indexed address,indexed address)
          handler: handleTreasuryUpdated
        - event: WorkSubmitted(indexed bytes32,indexed address,string)
          handler: handleWorkSubmitted
      file: ./src/job.ts

  - kind: ethereum
    name: Timelock
    network: base-sepolia
    source:
      address: "0xBBbDB407e8cDE61B0dc907FECc9Ad09DB43dC9E5"
      abi: Timelock
      startBlock: 38547098
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - TimelockOperation
        - TimelockRole
        - TimelockRoleConfig
        - ProtocolConfig
        - CallScheduledHistory
        - CallExecutedHistory
        - TimelockCancelledHistory
        - RoleGrantedHistory
        - RoleRevokedHistory
      abis:
        - name: Timelock
          file: ./abis/Timelock.json
      eventHandlers:
        - event: CallExecuted(indexed bytes32,indexed uint256,address,uint256,bytes)
          handler: handleCallExecuted
        - event: CallSalt(indexed bytes32,bytes32)
          handler: handleCallSalt
        - event: CallScheduled(indexed bytes32,indexed uint256,address,uint256,bytes,bytes32,uint256)
          handler: handleCallScheduled
        - event: Cancelled(indexed bytes32)
          handler: handleCancelled
        - event: MinDelayChange(uint256,uint256)
          handler: handleMinDelayChange
        - event: RoleAdminChanged(indexed bytes32,indexed bytes32,indexed bytes32)
          handler: handleRoleAdminChanged
        - event: RoleGranted(indexed bytes32,indexed address,indexed address)
          handler: handleRoleGranted
        - event: RoleRevoked(indexed bytes32,indexed address,indexed address)
          handler: handleRoleRevoked
      file: ./src/timelock.ts

  - kind: ethereum
    name: SkillSBT
    network: base-sepolia
    source:
      address: "0xDbAAaB3530D65E2eFfb684B38349922A4ca000F6"
      abi: SkillSBT
      startBlock: 38547098
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - SkillToken
        - SkillOperatorApproval
        - ProtocolConfig
        - SkillMintedHistory
        - SkillUpgradedHistory
        - SkillTransferHistory
      abis:
        - name: SkillSBT
          file: ./abis/SkillSBT.json
      eventHandlers:
        - event: Approval(indexed address,indexed address,indexed uint256)
          handler: handleApproval
        - event: ApprovalForAll(indexed address,indexed address,bool)
          handler: handleApprovalForAll
        - event: CouncilRegistryUpdated(indexed address,indexed address)
          handler: handleCouncilRegistryUpdated
        - event: SkillMinted(indexed uint256,indexed address,indexed bytes32,uint8,uint8,uint8,string)
          handler: handleSkillMinted
        - event: SkillUpgraded(uint256,uint8,uint8)
          handler: handleSkillUpgraded
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
      file: ./src/skill-sbt.ts

  - kind: ethereum
    name: Treasury
    network: base-sepolia
    source:
      address: "0xEd2Dc27114eE6D585DF95D1cDB5FbE06f8aB6e0F"
      abi: Treasury
      startBlock: 38547098
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - TreasuryAccount
        - ProtocolConfig
        - CouncilPaidHistory
        - CouncilRewardAddedHistory
        - DeveloperPaidHistory
        - DeveloperRewardAddedHistory
        - EmergencyWithdrawnHistory
        - ProtocolFeeReceivedHistory
      abis:
        - name: Treasury
          file: ./abis/Treasury.json
      eventHandlers:
        - event: CouncilPaid(indexed address,uint256)
          handler: handleCouncilPaid
        - event: CouncilRegistryUpdated(indexed address,indexed address)
          handler: handleCouncilRegistryUpdated
        - event: CouncilRewardAdded(indexed address,uint256)
          handler: handleCouncilRewardAdded
        - event: DeveloperPaid(indexed address,uint256)
          handler: handleDeveloperPaid
        - event: DeveloperRewardAdded(indexed address,uint256)
          handler: handleDeveloperRewardAdded
        - event: EmergencyWithdrawn(indexed address,uint256)
          handler: handleEmergencyWithdrawn
        - event: ProtocolFeeReceived(indexed address,uint256)
          handler: handleProtocolFeeReceived
        - event: TimelockUpdated(indexed address,indexed address)
          handler: handleTimelockUpdated
      file: ./src/treasury.ts

  - kind: ethereum
    name: UserRegistry
    network: base-sepolia
    source:
      address: "0x5aca866E18cc46c48ae02995e41A01b85D6a59da"
      abi: UserRegistry
      startBlock: 38547098
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - User
        - ProtocolConfig
        - UserRegisteredHistory
        - UserBlockedHistory
        - UserUnblockedHistory
      abis:
        - name: UserRegistry
          file: ./abis/UserRegistry.json
      eventHandlers:
        - event: TimelockUpdated(indexed address,indexed address)
          handler: handleTimelockUpdated
        - event: UserBlocked(indexed address)
          handler: handleUserBlocked
        - event: UserRegistered(indexed address,uint8)
          handler: handleUserRegistered
        - event: UserUnblocked(indexed address)
          handler: handleUserUnblocked
      file: ./src/user-registry.ts
