specVersion: 1.3.0

indexerHints:
  prune: auto

schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum
    name: Box
    network: base-sepolia
    source:
      address: "0x955a3a49d2920db97de7360da066c51b406941cf"
      abi: Box
      startBlock: 38344069
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      abis:
        - name: Box
          file: ./abis/Box.json
      eventHandlers:
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: ValueChanged(uint256)
          handler: handleValueChanged
      file: ./src/box.ts

  - kind: ethereum
