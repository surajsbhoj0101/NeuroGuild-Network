# -----------------------------------------
# Enums
# -----------------------------------------

enum JobStatus {
  OPEN
  IN_PROGRESS
  SUBMITTED
  COMPLETED
  CANCELLED
  DISPUTED
}

enum BidStatus {
  PENDING
  ACCEPTED
  REJECTED
}

enum ProposalStatus {
  CREATED
  QUEUED
  EXECUTED
  CANCELED
}

enum TimelockOperationStatus {
  SCHEDULED
  EXECUTED
  CANCELLED
}

enum DisputeStatus {
  OPEN
  RESOLVED
}

# -----------------------------------------
# Mutable State Entities
# -----------------------------------------

type ProtocolConfig @entity(immutable: false) {
  id: ID! # "global"
  timelock: Bytes
  treasury: Bytes
  councilRegistry: Bytes
  reputationContract: Bytes

  clientFeeBps: BigInt
  protocolFeeBps: BigInt
  reviewPeriod: BigInt
  quorumNumerator: BigInt
  minDelay: BigInt

  createdAt: BigInt!
  updatedAt: BigInt!
}

type BoxState @entity(immutable: false) {
  id: ID! # contract address
  owner: Bytes
  value: BigInt
  createdAt: BigInt!
  updatedAt: BigInt!
}

type User @entity(immutable: false) {
  id: ID! # wallet address
  wallet: Bytes!
  role: Int!
  isBlocked: Boolean!
  isCouncil: Boolean!
  createdAt: BigInt!
  updatedAt: BigInt!
}

type Proposal @entity(immutable: false) {
  id: ID! # proposalId
  proposer: Bytes!
  targets: [Bytes!]!
  values: [BigInt!]!
  signatures: [String!]!
  calldatas: [Bytes!]!
  voteStart: BigInt!
  voteEnd: BigInt!
  etaSeconds: BigInt
  description: String!
  status: ProposalStatus!
  createdAt: BigInt!
  updatedAt: BigInt!
  votes: [ProposalVoteHistory!]! @derivedFrom(field: "proposal")
}

type TokenAccount @entity(immutable: false) {
  id: ID! # tokenAddress-walletAddress
  token: Bytes!
  wallet: Bytes!
  balance: BigInt!
  delegate: Bytes
  votingPower: BigInt!
  createdAt: BigInt!
  updatedAt: BigInt!
}

type GovernanceApproval @entity(immutable: false) {
  id: ID! # tokenAddress-owner-spender
  token: Bytes!
  owner: Bytes!
  spender: Bytes!
  amount: BigInt!
  createdAt: BigInt!
  updatedAt: BigInt!
}

type Job @entity(immutable: false) {
  id: ID! # jobId
  client: Bytes!
  freelancer: Bytes
  status: JobStatus!
  budget: BigInt!
  bidDeadline: BigInt!
  expireDeadline: BigInt!
  ipfsHash: String
  ipfsProof: [String!]
  submittedAt: BigInt
  completedAt: BigInt
  fundLockedAt: BigInt
  fundReleasedAt: BigInt
  fundRefundedAt: BigInt
  fundLockedAmount: BigInt
  fundReleasedAmount: BigInt
  fundRefundedAmount: BigInt
  clientRating: Int
  freelancerRating: Int
  bidCount: Int!
  createdAt: BigInt!
  updatedAt: BigInt!
  bids: [JobBid!]! @derivedFrom(field: "job")
  dispute: JobDispute @derivedFrom(field: "job")
}

type JobBid @entity(immutable: false) {
  id: ID! # jobId-bidIndex
  job: Job!
  bidIndex: BigInt!
  freelancer: Bytes!
  amount: BigInt!
  proposalIpfs: String!
  status: BidStatus!
  createdAt: BigInt!
  updatedAt: BigInt!
}

type JobDispute @entity(immutable: false) {
  id: ID! # jobId
  job: Job!
  status: DisputeStatus!
  raisedBy: Bytes!
  reasonIpfs: String!
  winner: Bytes
  resolvedAt: BigInt
  createdAt: BigInt!
  updatedAt: BigInt!
}

type SkillToken @entity(immutable: false) {
  id: ID! # tokenId
  tokenId: BigInt!
  owner: Bytes!
  skillId: Bytes!
  aiScore: Int!
  councilConfidence: Int!
  level: Int!
  metadataURI: String!
  approved: Bytes
  createdAt: BigInt!
  updatedAt: BigInt!
}

type SkillOperatorApproval @entity(immutable: false) {
  id: ID! # skillSbtAddress-owner-operator
  token: Bytes!
  owner: Bytes!
  operator: Bytes!
  approved: Boolean!
  createdAt: BigInt!
  updatedAt: BigInt!
}

type TimelockOperation @entity(immutable: false) {
  id: ID! # operation id
  operationId: Bytes!
  index: BigInt
  target: Bytes
  value: BigInt
  data: Bytes
  predecessor: Bytes
  salt: Bytes
  delay: BigInt
  status: TimelockOperationStatus!
  createdAt: BigInt!
  updatedAt: BigInt!
}

type TimelockRole @entity(immutable: false) {
  id: ID! # role-account
  role: Bytes!
  account: Bytes!
  sender: Bytes
  isActive: Boolean!
  createdAt: BigInt!
  updatedAt: BigInt!
}

type TimelockRoleConfig @entity(immutable: false) {
  id: ID! # role
  role: Bytes!
  adminRole: Bytes!
  createdAt: BigInt!
  updatedAt: BigInt!
}

type TreasuryAccount @entity(immutable: false) {
  id: ID! # account address
  account: Bytes!
  councilRewardAdded: BigInt!
  councilPaid: BigInt!
  developerRewardAdded: BigInt!
  developerPaid: BigInt!
  protocolFeeContributed: BigInt!
  emergencyWithdrawn: BigInt!
  createdAt: BigInt!
  updatedAt: BigInt!
}

