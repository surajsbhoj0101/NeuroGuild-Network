services:
  backend:
    build: ./Backend
    ports:
      - "5000:5000"
    env_file:
      - ./Backend/.env
      - ./Backend/contract.env
    depends_on:
      - redis
    restart: always

  frontend:
    build: ./Frontend
    ports:
      - "80:80"
    restart: always

  redis:
    image: redis:7
    restart: always