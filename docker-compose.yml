services:
  backend:
    build: ./Backend
    ports:
      - "5000:5000"
    env_file:
      - ./Backend/.env
      - ./Backend/contract.env
    depends_on:
      - mongo
      - redis
    restart: always

  frontend:
    build: ./Frontend
    ports:
      - "80:80"
    restart: always

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    restart: always

volumes:
  mongo_data:
